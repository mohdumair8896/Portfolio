name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Validation
        run: npm run build
        
      # Note: Actual Vercel deployment is handled natively by Vercel's GitHub App integration.
      # When you connect your repo to Vercel, it automatically deploys on push to main.
      # If you prefer to deploy via CLI here, you would use:
      # - name: Deploy to Vercel
      #   run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
